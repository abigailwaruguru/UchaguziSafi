server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # React Router: serve index.html for all non-asset routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api requests to the backend (same-host deployment)
    location /api {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve uploaded evidence files (if backend shares the uploads volume)
    location /uploads {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    # Cache static assets aggressively (Vite hashes filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}
