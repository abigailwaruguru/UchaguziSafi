# =============================================================================
# UCHAGUZI SAFI — Alembic Configuration
# Run migrations from the backend/ directory:
#   cd backend
#   alembic revision --autogenerate -m "describe change"
#   alembic upgrade head
#   alembic downgrade -1
# =============================================================================

[alembic]
# Path to migration scripts, relative to this ini file
script_location = alembic

# Jinja2 template for new migration files
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# sys.path modification for imports
prepend_sys_path = .

# Timezone for revision timestamps (UTC for consistency across devs)
timezone = UTC

# Truncate revision message to this length in file names
truncate_slug_length = 40

# Version path separator (use os default: / on Linux, \ on Windows)
version_path_separator = os

# The sqlalchemy.url is OVERRIDDEN in alembic/env.py from app.core.config
# This placeholder prevents Alembic from complaining at startup.
sqlalchemy.url = postgresql://placeholder/placeholder


# ── Logging ─────────────────────────────────────────────────────────────────

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
